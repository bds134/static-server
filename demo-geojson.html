<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoJSON Search & Map Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/bootstrap-dark.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    #map { height: 300px; margin-top: 1em; border-radius: 0.5em; }
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      background: #181a1b;
      color: #e0e0e0;
    }
    .card {
      background: #23272b;
      border: 1px solid #343a40;
      color: #e0e0e0;
    }
    .form-label, .form-select, .form-control {
      color: #e0e0e0;
      background: #23272b;
      border: 1px solid #343a40;
    }
    .form-select:focus, .form-control:focus {
      background: #181a1b;
      color: #fff;
      border-color: #495057;
      box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
    }
    .entity-list {
      margin-top: 1em;
    }
    .entity-item {
      margin-bottom: 0.5em;
      padding: 0.5em 1em;
      background: #23272b;
      border-radius: 0.25em;
      border: 1px solid #343a40;
      color: #e0e0e0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: background 0.2s;
    }
    .entity-item:hover {
      background: #343a40;
    }
    #download-csv.btn {
      background: #0d6efd;
      border: none;
      color: #fff;
    }
    #download-csv.btn:hover {
      background: #0b5ed7;
    }
    h1 {
      color: #fff;
      text-shadow: 0 2px 8px #000;
    }
    .site-link { color: #0d6efd; text-decoration: underline; cursor: pointer; transition: color 0.2s, background 0.2s; }
    .site-link:hover { color: #0b5ed7; }
    nav.navbar { background: #23272b; border-bottom: 1px solid #343a40; }
    nav.navbar .navbar-brand { color: #fff !important; font-weight: bold; }
    nav.navbar .nav-link { color: #e0e0e0 !important; margin-right: 1rem; }
    nav.navbar .nav-link:hover { color: #fff !important; }
    nav.navbar .nav-link.active { color: #0d6efd !important; font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-sm">
    <div class="container-fluid">
      <span class="navbar-brand">📍 Geo Data Viz</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="demo-geojson.html">GeoJSON Demo</a></li>
          <li class="nav-item"><a class="nav-link" href="demo-xml.html">TEI XML Demo</a></li>
          <li class="nav-item"><a class="nav-link" href="https://github.com/bds134/static-server" target="_blank">Documentation</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <h1 class="mt-4 mb-4 text-center">GeoJSON Search & Map Demo</h1>
  <div class="card p-4 mb-4 shadow-sm">
    <h2 class="mb-3">Map of Featured Sites</h2>
    <div id="map" class="mb-3"></div>
    <h2 class="mb-3">Featured Sites (GeoJSON Data)</h2>
    <div id="featured-sites" style="line-height: 1.8;">Loading featured sites...</div>
    <hr class="my-4">
    <h2 class="mb-3">Search & Filter</h2>
    <form class="row g-3 align-items-center mb-3">
      <div class="col-md-6">
        <label for="search" class="form-label">Search by name:</label>
        <input type="text" id="search" class="form-control" placeholder="Type to search..." />
      </div>
      <div class="col-md-6">
        <label for="category" class="form-label">Category:</label>
        <select id="category" class="form-select">
          <option value="">All</option>
          <option value="Landmark">Landmark</option>
          <option value="Monument">Monument</option>
          <option value="Transport">Transport</option>
          <option value="Park">Park</option>
          <option value="Museum">Museum</option>
        </select>
      </div>
    </form>
    <button id="download-csv" class="btn btn-primary mb-3">Download Filtered List as CSV</button>
    <div class="entity-list" id="entity-list">
      <!-- Entities will be listed here. Use search and category to filter. -->
    </div>
    <hr class="my-4">
    <h2 class="mb-3">Raw GeoJSON</h2>
    <pre id="geojson-content" style="background:#181a1b; color:#e0e0e0; border-radius:0.5em; padding:1em; font-size:0.95em; overflow-x:auto;">Loading...</pre>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    let geojsonData;
    let map, markersLayer;

    // Load GeoJSON with error handling
    fetch('demo-geojson.geojson')
      .then(res => {
        if (!res.ok) throw new Error('GeoJSON file not found or server error');
        return res.json();
      })
      .then(data => {
        geojsonData = data;
        initMap();
        // Display raw GeoJSON
        document.getElementById('geojson-content').textContent = JSON.stringify(geojsonData, null, 2);
        // Build featured sites from GeoJSON
        buildFeaturedSites();
        // Show all entities on initial load
        updateListAndMap('', '');
      })
      .catch(err => {
        document.getElementById('entity-list').innerHTML = `<span style='color:red'>Error loading GeoJSON: ${err.message}</span>`;
        document.getElementById('map').innerHTML = '';
      });

    // Initialize map
    function initMap() {
      map = L.map('map').setView([40.75, -73.98], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);
    }

    // Build featured sites section from GeoJSON
    function buildFeaturedSites() {
      const featuredDiv = document.getElementById('featured-sites');
      const htmlContent = `
        <p>
          Welcome to New York City! This travel guide will take you to some of the city's most famous sites:
          <span class="site-link" data-site-name="Empire State Building">Empire State Building</span>, a towering landmark in Midtown Manhattan.<br>
          Next, visit the historic <span class="site-link" data-site-name="Statue of Liberty">Statue of Liberty</span> on Liberty Island, a symbol of freedom.<br>
          For a glimpse of New York's bustling transit, stop by <span class="site-link" data-site-name="Grand Central Terminal">Grand Central Terminal</span>.<br>
          Enjoy nature at <span class="site-link" data-site-name="Central Park">Central Park</span>, the city's iconic green space.<br>
          Art lovers should explore the <span class="site-link" data-site-name="Museum of Modern Art">Museum of Modern Art</span> and the grand <span class="site-link" data-site-name="Metropolitan Museum of Art">Metropolitan Museum of Art</span>.<br>
          Don't miss <span class="site-link" data-site-name="Columbus Circle">Columbus Circle</span>, a major landmark and gateway to Central Park.<br>
          Experience the energy of <span class="site-link" data-site-name="Times Square">Times Square</span>, famous for its lights and crowds.<br>
          Finally, relax at <span class="site-link" data-site-name="Washington Square Park">Washington Square Park</span>, a lively spot in Greenwich Village.
        </p>
      `;
      
      featuredDiv.innerHTML = htmlContent;

      // Attach click handlers to featured site links
      document.querySelectorAll('#featured-sites .site-link').forEach(el => {
        el.addEventListener('click', function() {
          const siteName = this.getAttribute('data-site-name');
          const feature = geojsonData.features.find(f => f.properties.name === siteName);
          if (feature) {
            const coords = feature.geometry.coordinates;
            map.setView([coords[1], coords[0]], 15);
            // Clear and show only this marker
            markersLayer.clearLayers();
            const marker = L.marker([coords[1], coords[0]]).addTo(markersLayer);
            marker.bindPopup(`<b>${siteName}</b><br>${feature.properties.category}`);
            marker.openPopup();
          }
        });
      });
    }

    // Update entity list and map markers
    let lastFilteredFeatures = [];
    function updateListAndMap(searchTerm, category) {
      const listDiv = document.getElementById('entity-list');
      listDiv.innerHTML = '';
      markersLayer.clearLayers();
      const features = geojsonData.features.filter(f => {
        const selectedCategory = category.trim().toLowerCase();
        const featureCategory = (f.properties.category || '').trim().toLowerCase();
        const matchesCategory = !selectedCategory || featureCategory === selectedCategory;
        if (!searchTerm) {
          return matchesCategory;
        }
        const matchesName = f.properties.name.toLowerCase().includes(searchTerm.toLowerCase());
        return matchesName && matchesCategory;
      });
      lastFilteredFeatures = features;
      if (features.length === 0) {
        listDiv.innerHTML = '<em>No entities found.</em>';
        map.setView([40.75, -73.98], 12);
        return;
      }
      features.forEach(f => {
        // List
        const item = document.createElement('div');
        item.className = 'entity-item';
        item.textContent = `${f.properties.name} (${f.properties.category})`;
        listDiv.appendChild(item);
        // Map marker
        const coords = f.geometry.coordinates;
        const marker = L.marker([coords[1], coords[0]]).addTo(markersLayer);
        marker.bindPopup(`<b>${f.properties.name}</b><br>${f.properties.category}`);
      });
      // Fit map to markers
      if (features.length) {
        const bounds = L.latLngBounds(features.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]));
        map.fitBounds(bounds, { maxZoom: 14 });
      }
    }

    // Search and category events
    const searchInput = document.getElementById('search');
    const categorySelect = document.getElementById('category');
    function triggerUpdate() {
      updateListAndMap(searchInput.value, categorySelect.value);
    }
    searchInput.addEventListener('input', triggerUpdate);
    categorySelect.addEventListener('change', triggerUpdate);
    
    // Invalidate map size after content loads
    setTimeout(function() {
      map.invalidateSize();
    }, 500);
    
    // Download CSV feature
    document.getElementById('download-csv').addEventListener('click', function() {
      if (!lastFilteredFeatures || lastFilteredFeatures.length === 0) {
        alert('No entities to download.');
        return;
      }
      // CSV header
      let csv = 'Name,Category,Longitude,Latitude\n';
      lastFilteredFeatures.forEach(f => {
        const name = f.properties.name.replace(/"/g, '""');
        const category = f.properties.category.replace(/"/g, '""');
        const lon = f.geometry.coordinates[0];
        const lat = f.geometry.coordinates[1];
        csv += `"${name}","${category}",${lon},${lat}\n`;
      });
      // Download
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'entities.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
