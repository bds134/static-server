<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <meta charset="UTF-8">
  <title>NYC Travel Guide (TEI XML)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/bootstrap-dark.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">📍 Geo Data Viz</div>
    <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <ul class="navbar-links" id="navbar-links">
      <li><a href="demo-geojson.html">GeoJSON Demo</a></li>
      <li><a href="demo-xml.html">TEI XML Demo</a></li>
      <li><a href="https://github.com/bds134/static-server" target="_blank">Documentation</a></li>
    </ul>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.getElementById('navbar-toggle');
      var links = document.getElementById('navbar-links');
      if (toggle && links) {
        toggle.addEventListener('click', function() {
          links.classList.toggle('active');
        });
      }
    });
  </script>

  <h1 class="mt-4 mb-4 text-center">TEI XML Demo</h1>
  <div class="card p-4 mb-4 shadow-sm">
    <h2 class="mb-3">Map of Featured Sites</h2>
    <div id="tei-map" style="height: 300px; border-radius: 0.5em; margin-bottom: 2em;"></div>
    <h2 class="mb-3">Featured Sites (Marked-up Text)</h2>
    <div id="featured-sites" style="line-height: 1.8;">Loading content from TEI XML...</div>
    <hr class="my-4">
    <h2 class="mb-3">Raw TEI XML</h2>
    <pre id="tei-xml-content" style="background:#181a1b; color:#e0e0e0; border-radius:0.5em; padding:1em; font-size:0.95em; overflow-x:auto;">Loading...</pre>
    <div class="mt-4">
      <a href="demo-geojson.html" class="btn btn-primary">Go to Map & Search</a>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('tei-map').setView([40.75, -73.98], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    const markersLayer = L.layerGroup().addTo(map);
    
    // Store marker references for highlighting (keyed by ref attribute)
    const markerRefs = {};
    
    // Default and red marker icons
    const defaultIcon = L.icon({
      iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      shadowSize: [41, 41]
    });
    
    const redIcon = L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      shadowSize: [41, 41]
    });

    // Function to attach click handlers to site links
    function attachSiteLinkHandlers() {
      document.querySelectorAll('.site-link').forEach(function(el) {
        el.addEventListener('click', function() {
          // Remove active from all site links
          document.querySelectorAll('.site-link').forEach(e => e.classList.remove('active'));
          el.classList.add('active');
          // Reset all markers to default icon
          Object.values(markerRefs).forEach(ref => ref.marker.setIcon(ref.defaultIcon));
          // Pan map to marker and set red icon
          const ref = el.getAttribute('data-ref');
          if (markerRefs[ref]) {
            const coords = [markerRefs[ref].lat, markerRefs[ref].lon];
            map.setView(coords, 15);
            markerRefs[ref].marker.setIcon(markerRefs[ref].redIcon);
            markerRefs[ref].marker.openPopup();
          }
        });
      });
    }

    // Load and display the TEI XML file
    fetch('demo-nyc-guide-tei.xml')
      .then(response => response.text())
      .then(xmlText => {
        // Parse the XML
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

        // Check for parsing errors
        if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
          throw new Error('Failed to parse XML');
        }

        // Extract text and placeName elements from the paragraph
        const pElement = xmlDoc.querySelector('p');
        if (pElement) {
          // Build featured sites HTML from XML and create markers
          let htmlContent = '<p>';
          
          Array.from(pElement.childNodes).forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) {
              // Regular text
              htmlContent += node.textContent;
            } else if (node.nodeName === 'placeName') {
              // Extract attributes and text
              const ref = node.getAttribute('ref') || '';
              const lat = parseFloat(node.getAttribute('lat'));
              const lon = parseFloat(node.getAttribute('lon'));
              const text = node.textContent;
              
              htmlContent += `<span class="site-link" data-ref="${ref}">${text}</span>`;
              
              // Create marker if coordinates are available
              if (!isNaN(lat) && !isNaN(lon)) {
                const marker = L.marker([lat, lon], {icon: defaultIcon}).addTo(markersLayer);
                marker.bindPopup(`<b>${text}</b>`);
                markerRefs[ref] = { marker, defaultIcon, redIcon, lat, lon };
              }
            }
          });
          
          htmlContent += '</p>';
          document.getElementById('featured-sites').innerHTML = htmlContent;

          // Reattach click handlers to the newly created site links
          attachSiteLinkHandlers();
        }

        // Display the raw XML directly
        document.getElementById('tei-xml-content').textContent = xmlText;
      })
      .catch(error => {
        document.getElementById('featured-sites').textContent = 'Error loading XML: ' + error.message;
        document.getElementById('tei-xml-content').textContent = 'Error loading XML: ' + error.message;
        console.error('Failed to load TEI XML:', error);
      });

    // Invalidate map size after content loads to ensure proper rendering
    setTimeout(function() {
      map.invalidateSize();
    }, 500);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
